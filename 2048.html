<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="game-container">
        <div class="score">Score: <span id="score">0</span></div>
        <div class="grid-container">
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
        </div>
        <button id="undo-button">Undo</button>
        <button id="restart-button">Restart</button>
    </div>
    <script>
        let board;
        let score = 0;
        let bestScore = localStorage.getItem('bestScore') || 0;
        const gridCells = document.querySelectorAll('.grid-cell');
        const scoreDisplay = document.getElementById('score');

        function init() {
            board = Array(4).fill().map(() => Array(4).fill(0));
            score = 0;
            updateBoard();
            addNumber();
            addNumber();
            updateScoreDisplay();
        }

        function updateBoard() {
            gridCells.forEach((cell, index) => {
                const row = Math.floor(index / 4);
                const col = index % 4;
                cell.textContent = board[row][col] ? board[row][col] : '';
                cell.className = 'grid-cell';
                if (board[row][col] > 0) {
                    cell.classList.add('tile-' + board[row][col]);
                }
            });
        }

        function addNumber() {
            const emptyCells = [];
            board.forEach((row, rIndex) => {
                row.forEach((value, cIndex) => {
                    if (value === 0) emptyCells.push({ rIndex, cIndex });
                });
            });
            if (emptyCells.length) {
                const { rIndex, cIndex } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[rIndex][cIndex] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function updateScoreDisplay() {
            scoreDisplay.textContent = score;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('bestScore', bestScore);
            }
        }

        function move(direction) {
            let moved = false;
            // Implement move logic for up, down, left, right
            // Include tile merging logic, score updating, and animations
            // Add event listeners to handle keyboard and touch input 
            // Update 'moved' to true if any tiles move
            // After the move, call addNumber() if moved
            return moved;
        }

        document.addEventListener('keydown', (event) => {
            switch (event.key) {
                case 'ArrowUp':
                    if (move('up')) {
                        addNumber();
                        updateBoard();
                    }
                    break;
                case 'ArrowDown':
                    if (move('down')) {
                        addNumber();
                        updateBoard();
                    }
                    break;
                case 'ArrowLeft':
                    if (move('left')) {
                        addNumber();
                        updateBoard();
                    }
                    break;
                case 'ArrowRight':
                    if (move('right')) {
                        addNumber();
                        updateBoard();
                    }
                    break;
            }
        });

        document.getElementById('restart-button').addEventListener('click', init);

        init();
    </script>
</body>
</html>
